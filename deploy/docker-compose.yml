services:
  db:
    image: postgres:16
    container_name: isp_monitoring_db
    environment:
      POSTGRES_USER: isp_user
      POSTGRES_PASSWORD: isp_password
      POSTGRES_DB: isp_monitoring
      TZ: Asia/Jakarta
    ports:
      # Bind ke 127.0.0.1 agar DB tidak terekspos ke internet (aman di VPS)
      # Backend mengakses DB via 127.0.0.1:5432 dari host network
      - "127.0.0.1:5432:5432"
    volumes:
      - ./../db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./../db_data:/var/lib/postgresql/data
    networks:
      - isp_net
    restart: always

  backend:
    image: golang:1.24
    container_name: isp_monitoring_backend
    working_dir: /app
    volumes:
      - ./../backend:/app
    command: ["sh", "-c", "go mod download && go run ."]
    environment:
      # Menggunakan 127.0.0.1 karena backend menggunakan host network mode.
      # Di VPS Linux: mengakses DB langsung via port mapping 127.0.0.1:5432.
      # Di Windows Docker Desktop: host network tetap berjalan meskipun
      # per-device tracking kurang presisi (semua router terlihat dari 172.x.x.x).
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_USER: isp_user
      POSTGRES_PASSWORD: isp_password
      POSTGRES_DB: isp_monitoring
      TZ: Asia/Jakarta
    depends_on:
      - db
    # network_mode: host memungkinkan backend melihat IP asli router MikroTik.
    # - Di VPS Linux: AKTIF PENUH → semua router terdeteksi by IP masing-masing
    #   di port yang sama (2055). Tidak perlu konfigurasi tambahan per router.
    # - Di Windows Docker Desktop: terbatas, tapi app tetap berjalan normal.
    network_mode: host
    restart: always

  frontend:
    image: node:20
    container_name: isp_monitoring_frontend
    working_dir: /app
    volumes:
      - ./../frontend:/app
      - /app/node_modules
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - isp_net

networks:
  isp_net:
    driver: bridge
