services:
  db:
    image: postgres:16
    container_name: isp_monitoring_db
    environment:
      POSTGRES_USER: isp_user
      POSTGRES_PASSWORD: isp_password
      POSTGRES_DB: isp_monitoring
    ports:
      - "5432:5432"
    volumes:
      - ./../db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - isp_net

  backend:
    image: golang:1.22.12
    container_name: isp_monitoring_backend
    working_dir: /app
    volumes:
      - ./../backend:/app
    command: ["sh", "-c", "go mod download && go run ."]
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: isp_user
      POSTGRES_PASSWORD: isp_password
      POSTGRES_DB: isp_monitoring
    depends_on:
      - db
    ports:
      - "8080:8080"
    networks:
      - isp_net

  frontend:
    image: node:20
    container_name: isp_monitoring_frontend
    working_dir: /app
    volumes:
      - ./../frontend:/app
      - /app/node_modules
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - isp_net

networks:
  isp_net:
    driver: bridge
