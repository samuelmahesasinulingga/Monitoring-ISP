# =====================================================================
# docker-compose.vps.yml
# Konfigurasi PRODUCTION untuk VPS Linux.
#
# Perbedaan dari docker-compose.yml (Windows localhost):
# - Backend: network_mode: host → IP asli router terdeteksi (tanpa NAT)
# - Backend: POSTGRES_HOST: 127.0.0.1 → koneksi DB via localhost
# - DB: port bind ke 127.0.0.1 → tidak terekspos ke internet
#
# Di VPS, semua router cukup pakai port 2055 yang sama.
# Tidak perlu konfigurasi port berbeda per router baru.
#
# CARA DEPLOY:
#   docker-compose -f docker-compose.vps.yml up -d
# =====================================================================

services:
  db:
    image: postgres:16
    container_name: isp_monitoring_db
    environment:
      POSTGRES_USER: isp_user
      POSTGRES_PASSWORD: isp_password
      POSTGRES_DB: isp_monitoring
      TZ: Asia/Jakarta
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./../db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./../db_data:/var/lib/postgresql/data
    networks:
      - isp_net
    restart: always

  backend:
    image: golang:1.24
    container_name: isp_monitoring_backend
    working_dir: /app
    volumes:
      - ./../backend:/app
    command: ["sh", "-c", "go mod download && go run ."]
    environment:
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_USER: isp_user
      POSTGRES_PASSWORD: isp_password
      POSTGRES_DB: isp_monitoring
      TZ: Asia/Jakarta
    depends_on:
      - db
    network_mode: host
    restart: always

  frontend:
    image: node:20
    container_name: isp_monitoring_frontend
    working_dir: /app
    volumes:
      - ./../frontend:/app
      - /app/node_modules
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - isp_net

networks:
  isp_net:
    driver: bridge
