# =====================================================================
# docker-compose.vps.yml
# Konfigurasi PRODUCTION untuk VPS Linux.
#
# Perbedaan dari docker-compose.yml (Windows localhost):
# - Backend: network_mode: host → IP asli router terdeteksi (tanpa NAT)
# - Backend: POSTGRES_HOST: 127.0.0.1 → koneksi DB via localhost
# - DB: port bind ke 127.0.0.1 → tidak terekspos ke internet
# - Backend & Frontend: pakai Dockerfile (binary/build), bukan go run / npm run dev
#
# CARA DEPLOY (pertama kali atau setelah ada perubahan kode):
#   docker compose -f docker-compose.vps.yml up -d --build
#
# Update tanpa rebuild (restart saja):
#   docker compose -f docker-compose.vps.yml up -d
# =====================================================================

services:
  db:
    image: postgres:16
    container_name: isp_monitoring_db
    environment:
      POSTGRES_USER: isp_user
      POSTGRES_PASSWORD: isp_password
      POSTGRES_DB: isp_monitoring
      TZ: Asia/Jakarta
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./../db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./../db_data:/var/lib/postgresql/data
    networks:
      - isp_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isp_user -d isp_monitoring"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./../backend
      dockerfile: Dockerfile
    image: isp_monitoring_backend:latest
    container_name: isp_monitoring_backend
    environment:
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_USER: isp_user
      POSTGRES_PASSWORD: isp_password
      POSTGRES_DB: isp_monitoring
      TZ: Asia/Jakarta
    volumes:
      # Persist folder uploads (logo, invoice, dll) agar tidak hilang saat rebuild
      - ./../backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    network_mode: host
    restart: unless-stopped

  frontend:
    build:
      context: ./../frontend
      dockerfile: Dockerfile
    image: isp_monitoring_frontend:latest
    container_name: isp_monitoring_frontend
    ports:
      - "5173:5173"
    extra_hosts:
      # Mapping host.docker.internal → host machine agar nginx bisa proxy ke backend
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
    networks:
      - isp_net
    restart: unless-stopped

networks:
  isp_net:
    driver: bridge
